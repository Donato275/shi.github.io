<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0f1419">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title id="page-title">Il mio migliore fratello - Il Cane</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Outfit:wght@300;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header>
        <nav>
            <a href="#home">Home</a>
            <a href="#chi-siamo">Chi siamo</a>
            <a href="#servizi">Servizi</a>
            <a href="#contatti">Contatti</a>
        </nav>
    </header>

    <main id="home">
        <!-- ========== SEZIONE HOME ========== -->
        <section class="hero">
            <div class="hero-title-wrapper">
                <h1 id="titolo-principale">Il mio migliore fratello</h1>
            </div>
            <p class="subtitle" id="sottotitolo">Il Cane</p>
        </section>

        <section class="photos-section">
            <div class="photos-grid" id="foto-container">
                <!-- Le foto vengono caricate da I_MIEI_DATI.js -->
            </div>
        </section>

        <!-- ========== CHI SIAMO ========== -->
        <section id="chi-siamo" class="content-section">
            <h2>Chi siamo</h2>
            <p id="chi-siamo-1"></p>
            <p id="chi-siamo-2"></p>
        </section>

        <!-- ========== SERVIZI ========== -->
        <section id="servizi" class="content-section">
            <h2>Servizi</h2>
            <p id="servizi-intro"></p>
            <div class="services-grid" id="servizi-container">
                <!-- Le schede vengono caricate da I_MIEI_DATI.js -->
            </div>
        </section>

        <!-- ========== CONTATTI ========== -->
        <section id="contatti" class="content-section">
            <h2>Contatti</h2>
            <p id="contatti-intro"></p>
            <form class="contact-form" action="#" method="post" onsubmit="return false;">
                <label for="nome">Nome e cognome</label>
                <input type="text" id="nome" name="nome" placeholder="Il tuo nome" required>

                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="la-tua@email.com" required>

                <label for="messaggio">Messaggio</label>
                <textarea id="messaggio" name="messaggio" placeholder="Scrivi qui il tuo messaggio..." required></textarea>

                <button type="submit" class="btn-invia">Invia messaggio</button>
            </form>
            <div class="contact-info">
                <p id="contatti-email">📧 email@esempio.com</p>
                <p id="contatti-telefono">📱 +39 123 456 7890</p>
                <div class="social-links" id="social-container">
                    <!-- I social vengono caricati da I_MIEI_DATI.js -->
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p id="footer-text">© 2025 Il mio migliore fratello - Il Cane. Tutti i diritti riservati.</p>
    </footer>

    <script src="I_MIEI_DATI.js"></script>

                    if (d.social[s.key] && d.social[s.key].trim() !== '') {
                        html += '<a href="'+d.social[s.key]+'" target="_blank" rel="noopener" title="'+s.key+'"><svg viewBox="0 0 24 24" fill="currentColor"><path d="'+s.icon+'"/></svg></a>';

            var ft = document.getElementById('footer-text'); if (ft) ft.textContent = d.footer;
        })();
    </script>
</body>

</html>
